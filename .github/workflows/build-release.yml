name: Build and Release NINA GRB Plugin

on:
  push:
    tags:
      - 'v*.*.*.*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download NINA and extract DLLs
        shell: pwsh
        run: |
          $ninaUrl = "https://github.com/isbeorn/nina/releases/download/3.0.0.2017/NINA-3.0.0.2017-x64.msi"
          Invoke-WebRequest -Uri $ninaUrl -OutFile "nina.msi" -UseBasicParsing
          New-Item -ItemType Directory -Force -Path "C:\NINA_INSTALL"
          Start-Process msiexec.exe -ArgumentList '/a nina.msi /qn TARGETDIR=C:\NINA_INSTALL' -Wait
          $ninaDll = Get-ChildItem "C:\NINA_INSTALL" -Recurse -Filter "NINA.Core.dll" | Select-Object -First 1
          Write-Host "Found NINA at: $($ninaDll.DirectoryName)"
          echo "NINA_DIR=$($ninaDll.DirectoryName)" >> $env:GITHUB_ENV

      - name: Restore dependencies
        shell: pwsh
        run: dotnet restore Demo_2/Demo_2.csproj /p:NINADir="$env:NINA_DIR"

      - name: Build Release
        shell: pwsh
        run: |
          dotnet build Demo_2/Demo_2.csproj `
            --configuration Release `
            --no-restore `
            /p:NINADir="$env:NINA_DIR"

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $dll = Get-ChildItem -Recurse -Filter "Sd.NINA.Demo2.dll" |
            Where-Object { $_.FullName -like "*Release*" } |
            Select-Object -First 1
          Write-Host "DLL found at: $($dll.FullName)"
          Compress-Archive -Path "$($dll.DirectoryName)\*" -DestinationPath "GRB_Helper.$version.zip"

      - name: Clone manifest tools
        run: git clone https://github.com/isbeorn/nina.plugin.manifests.git manifest-tools

      - name: Generate manifest.json
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $dll = Get-ChildItem -Recurse -Filter "Sd.NINA.Demo2.dll" |
            Where-Object { $_.FullName -like "*Release*" } |
            Select-Object -First 1
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/v$version/GRB_Helper.$version.zip"
          & "manifest-tools/tools/CreateManifest.ps1" `
            -file $dll.FullName `
            -installerUrl $installerUrl `
            -createArchive `
            -archiveName "GRB_Helper.$version"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GRB_Helper.*.zip
            manifest.json
          generate_release_notes: true
