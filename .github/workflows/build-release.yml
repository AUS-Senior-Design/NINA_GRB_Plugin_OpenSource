name: Build and Release NINA GRB Plugin

on:
  push:
    tags:
      - 'v*.*.*.*'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Demo_2/Demo_2.csproj

      - name: Build Release
        run: dotnet build Demo_2/Demo_2.csproj --configuration Release --no-restore

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $dll = Get-ChildItem -Recurse -Filter "Sd.NINA.Demo2.dll" |
            Where-Object { $_.FullName -like "*Release*" } |
            Select-Object -First 1
          Write-Host "DLL found at: $($dll.FullName)"
          Compress-Archive -Path "$($dll.DirectoryName)\*" -DestinationPath "GRB_Helper.$version.zip"

      - name: Clone manifest tools
        run: git clone https://github.com/isbeorn/nina.plugin.manifests.git manifest-tools

      - name: Generate manifest.json
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $dll = Get-ChildItem -Recurse -Filter "Sd.NINA.Demo2.dll" |
            Where-Object { $_.FullName -like "*Release*" } |
            Select-Object -First 1
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/v$version/GRB_Helper.$version.zip"
          & "manifest-tools/tools/CreateManifest.ps1" `
            -file $dll.FullName `
            -installerUrl $installerUrl `
            -createArchive `
            -archiveName "GRB_Helper.$version"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GRB_Helper.*.zip
            manifest.json
          generate_release_notes: true
